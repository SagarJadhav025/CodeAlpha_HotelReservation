<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sagar's Hotel 🏨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .available { border-top: 5px solid #28a745; }
        .booked { border-top: 5px solid #dc3545; opacity: 0.7; }
        input { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

<h1>Sagar's Luxury Hotel 🌴</h1>
<p>Select from our 32 premium rooms.</p>

<p th:if="${error != null}" th:text="${error}" class="error"></p>

<div class="grid">
    <div th:each="room : ${rooms}" class="card" th:classappend="${room.available ? 'available' : 'booked'}">
        <h3>Room [[${room.id}]] - [[${room.type}]]</h3>
        <p>$[[${room.price}]] / night</p>

        <div th:if="${room.available}">
            <form action="/book" method="post">
                <input type="hidden" name="roomId" th:value="${room.id}">
                <input type="text" name="guestName" placeholder="Your Name" required>
                <input type="email" name="guestEmail" placeholder="Your Email" required>
                <input type="text" placeholder="Card Number (Dummy)" required maxlength="16">
                <button type="submit">Pay & Book</button>
            </form>
        </div>

        <div th:if="${!room.available}">
            <button disabled>Pre-Booked ❌</button>
        </div>
    </div>
</div>

</body>
</html>
