<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #e0f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .ticket { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h1 { color: #28a745; margin-bottom: 5px; }
        .id { font-size: 1.5rem; font-weight: bold; background: #f1f1f1; padding: 10px; border-radius: 5px; letter-spacing: 2px; }
        .info { text-align: left; margin-top: 20px; line-height: 1.8; font-size: 1.1rem;}
        a { display: inline-block; margin-top: 20px; text-decoration: none; background: #007BFF; color: white; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="ticket">
    <h1>Payment Successful! ✅</h1>
    <p>A confirmation email has been sent to <b>[[${booking.guestEmail}]]</b>.</p>

    <p class="id">ID: [[${booking.bookingId}]]</p>

    <div class="info">
        <p>👤 <b>Name:</b> [[${booking.guestName}]]</p>
        <p>🚪 <b>Room:</b> [[${booking.room.id}]] ([[${booking.room.type}]])</p>
        <p>💵 <b>Amount Paid:</b> $[[${booking.room.price}]]</p>
    </div>

    <a href="/">Back to Home</a>
</div>

</body>
</html>
